syntax = "proto3";
package login;
option go_package = "gameServer/protobuf/pbGo";
import "item.proto";
import "hero.proto";

// 协议: 4 登录
message LoginReq {
  string code = 1; //  第三方登录凭证
  int32 loginType = 2; // 登录类型，1：抖音登录
}
message LoginResp {
  uint64 userId = 1;//自身id
  repeated awardInfo awardInfoList = 3;//奖励信息集合
  repeated item.itemInfo itemList = 7;//道具集合
  repeated hero.heroInfo heroList = 8;//人物集合
}

// 奖励信息
message awardInfo {
  uint32 id = 1; //  奖励id
  bool isReceived  = 2; // 是否已经领取,true已经领取
}